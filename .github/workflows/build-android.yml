name: Build Android APK & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Triggers on version tags, e.g., v1.0.0
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # JDK 17 is standard and fully supported by Expo SDK 54

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Project Dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Restore Local Signing Credentials
        env:
          CREDENTIALS_JSON_BASE64: ${{ secrets.CREDENTIALS_JSON_BASE64 }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$CREDENTIALS_JSON_BASE64" ]; then
            echo "$CREDENTIALS_JSON_BASE64" | base64 --decode > credentials.json
          fi
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
          fi

      - name: Build Android APK Locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile preview --local --non-interactive --output=qadr-preview.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qadr-preview-apk
          path: qadr-preview.apk
          retention-days: 14 # Store for 2 weeks on GitHub Actions runs

      - name: Create GitHub Release & Upload APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: qadr-preview.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## 📱 Qadr Android Preview Build
            
            This release was automatically built and compiled using GitHub Actions local runners!
            
            ### 🛠️ Changes in this version
            * Commit: ${{ github.sha }}
            
            ### 📲 Download & Install
            1. Download the `qadr-preview.apk` attached below.
            2. Open the APK on your Android device and install it.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
