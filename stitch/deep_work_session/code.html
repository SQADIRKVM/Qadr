<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Deep Work Session - Qadr</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#454747",
                        "secondary-fixed": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#930017",
                        "error-container": "#93000a",
                        "tertiary-fixed": "#ffdad7",
                        "surface-bright": "#393939",
                        "on-tertiary-container": "#eb002c",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-secondary-fixed": "#1a1c1c",
                        "surface-variant": "#353535",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container-high": "#2a2a2a",
                        "inverse-primary": "#5e5e5e",
                        "background": "#131313",
                        "on-primary-container": "#757575",
                        "tertiary": "#ffb3af",
                        "on-secondary": "#2f3131",
                        "on-tertiary": "#68000e",
                        "inverse-on-surface": "#313030",
                        "surface-tint": "#c6c6c6",
                        "outline": "#988e90",
                        "primary-fixed": "#e2e2e2",
                        "on-tertiary-fixed": "#410005",
                        "surface-container-low": "#1c1b1b",
                        "on-primary-fixed-variant": "#474747",
                        "outline-variant": "#4c4546",
                        "primary-container": "#000000",
                        "primary": "#c6c6c6",
                        "tertiary-fixed-dim": "#ffb3af",
                        "primary-fixed-dim": "#c6c6c6",
                        "surface-container-highest": "#353535",
                        "on-error": "#690005",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#b4b5b5",
                        "inverse-surface": "#e5e2e1",
                        "surface": "#131313",
                        "on-surface-variant": "#cfc4c5",
                        "surface-container": "#20201f",
                        "surface-dim": "#131313",
                        "tertiary-container": "#000000",
                        "on-background": "#e5e2e1",
                        "secondary": "#c6c6c7",
                        "on-secondary-fixed-variant": "#454747",
                        "on-primary": "#303030",
                        "on-surface": "#e5e2e1",
                        "on-primary-fixed": "#1b1b1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "card": "24px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "margin-desktop": "48px",
                        "base": "8px",
                        "gutter": "24px",
                        "container-max": "1200px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"],
                        "headline-xl": ["Space Grotesk"],
                        "body-md": ["Inter"],
                        "headline-md": ["Space Grotesk"],
                        "label-sm": ["Space Grotesk"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "500" }],
                        "headline-xl": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
<style>
        .dot-matrix-bg {
            background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 8px 8px;
        }
        .circular-progress {
            stroke-dasharray: 880; /* Circumference for r=140 */
            stroke-dashoffset: 220; /* 75% complete */
            transition: stroke-dashoffset 1s linear;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md dot-matrix-bg selection:bg-surface-bright selection:text-white">
<!-- Header / Intent: Transactional/Task-focused (Deep Work), so TopAppBar/BottomNav suppressed -->
<header class="w-full flex items-center justify-between px-margin-desktop py-8 pt-12 max-w-container-max mx-auto relative z-10 md:px-margin-desktop px-margin-mobile">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest border border-[#262626] hover:border-white transition-colors text-primary group">
<span aria-label="Go back" class="material-symbols-outlined text-2xl group-active:scale-95 transition-transform">arrow_back</span>
</button>
<div class="absolute left-1/2 -translate-x-1/2 text-center">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">SESSION ACTIVE</span>
</div>
<div class="w-12 h-12"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop w-full max-w-container-max mx-auto -mt-16">
<!-- Headline -->
<div class="text-center mb-16 z-10">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-2">Stay in the flow, Qadir.</h1>
</div>
<!-- Timer Circle -->
<div class="relative w-[320px] h-[320px] md:w-[400px] md:h-[400px] flex items-center justify-center mb-24 z-10 group">
<!-- SVG Progress Ring -->
<svg class="absolute inset-0 w-full h-full -rotate-90 pointer-events-none" viewbox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
<!-- Track -->
<circle class="stroke-[#262626]" cx="160" cy="160" fill="none" r="140" stroke-width="4"></circle>
<!-- Progress -->
<circle class="stroke-primary circular-progress" cx="160" cy="160" fill="none" r="140" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<div class="text-center flex flex-col items-center justify-center">
<span class="font-headline-xl text-headline-xl text-on-surface tracking-tighter tabular-nums drop-shadow-[0_0_12px_rgba(255,255,255,0.1)]">45:00</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mt-4">DEEP WORK SESSION</span>
</div>
</div>
<!-- Controls -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full max-w-3xl z-10">
<!-- Silence Card -->
<div class="bg-[#121212] border border-[#262626] rounded-card p-6 flex items-center justify-between hover:border-white transition-colors group relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center border border-[#262626]">
<span class="material-symbols-outlined text-primary text-xl">notifications_paused</span>
</div>
<div>
<h3 class="font-body-lg text-body-lg text-on-surface font-medium">Silence the World</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">DND Enabled</p>
</div>
</div>
<!-- Custom Toggle (Checked state) -->
<button aria-label="Toggle Do Not Disturb" aria-pressed="true" class="relative w-12 h-6 bg-[#eb002c] rounded-full flex items-center transition-colors focus:outline-none focus:ring-2 focus:ring-[#eb002c] focus:ring-offset-2 focus:ring-offset-background">
<span class="translate-x-7 inline-block w-4 h-4 transform bg-white rounded-full transition-transform"></span>
</button>
</div>
<!-- End Session Card -->
<button class="bg-[#121212] border border-[#262626] rounded-card p-6 flex items-center gap-4 hover:border-white transition-colors group relative overflow-hidden text-left focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background">
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center border border-[#262626] group-hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings: 'FILL' 1;">stop</span>
</div>
<div>
<h3 class="font-body-lg text-body-lg text-on-surface font-medium">End Session</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Return to standard</p>
</div>
</button>
</div>
</main>
<!-- Footer Indicator -->
<footer class="w-full flex justify-center pb-margin-desktop pt-8 relative z-10">
<div class="bg-[#1a1a1a] border border-[#262626] rounded-full px-4 py-2 flex items-center gap-2 shadow-[0_4px_12px_rgba(0,0,0,0.2)]">
<span class="w-1.5 h-1.5 rounded-full bg-[#eb002c]"></span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">SESSION 2 OF 4</span>
</div>
</footer>
</body></html>
